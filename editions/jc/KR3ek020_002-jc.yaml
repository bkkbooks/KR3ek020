body:
  text: 卷之二背圖形八症一腦發痄腮上背發在天柱下中背發正對前心下背發正對臍腰背發暗發騎馬癰赤腮癰即痄腮腦發腦發生於巔頂由督脈太陽經所生也乃陰陽不和氣熱上壅積聚不散故成此毒若不速治頂裂髓枯不可救也先用敗毒流氣飲次以內托流氣飲後用白芷散外用敷方八味敗毒流氣飲蘇葉桔根枳殼麩炒甘草防風人參羌活白芍水煎食後服十五味內托流氣飲人參木香炙黃耆炙甘草厚朴薑汁炒蘇葉肉桂去皮枳殼桔根檳榔烏藥當歸白芷川芎防風空心服六味白芷散白芷藁本升麻黃連忍冬藤龍膽草空心服六味外用敷方龍膽草忍冬藤白芷牛黃雄黃地骨皮以上各等分洗淨酒浸透搗極細敷毒處四圍神效痄腮痄腮毒生於牙根耳庭之前後通於肝腎由少陽陽明經所生也亦名赤腮癰乃氣血不行壅滯頰腮宜用清肝流氣飲一二劑後用托裡飲外用萬靈膏如初起時覺癢用艾灸六七壯並頰車肩井穴內各灸三壯甚效清肝流氣飲桔根枳殼白茯苓柴胡羌活甘草石膏防風厚朴烏藥官桂木香薑棗引食後服托裡飲人參當歸黃耆蜜炙川芎赤芍甘草防風厚朴烏藥去皮官桂木香薑棗引食後服六味敷方青蒿春夏取苗秋冬取根二花雄黃生蔥黃泥蜂蜜各等分搗細成餅側臥貼之若初起用之即愈上背發上背發生於百勞骨下三四節之間由督脈太陽經所生也受病在胸身經生肺肝乃心經鬱熱後因怒氣傷肝熱鬱不伸乃生背發內經曰營氣不從逆於肉裡至生癰疽先宜敗毒流氣飲一二劑次用護心托裡飲如危甚用神效忍冬湯外須用敷藥待膿盡用生肌散初起如黃豆大時宜用海馬崩毒法次用四圍灸法如輕可減半矣此症大忌房事穢氣香味等項十味敗毒流氣飲人參桔根枳殼麩炒甘草防風荊芥少許柴胡川芎白芷白芍薑棗引空心服十味護心托裡飲黃連梔子連翹羌活桔根白芷連子乾葛升麻防風姜引空心服十四味流氣飲黃連羌活柴胡木香陳皮紫蘇當歸生地川芎甘草烏藥檳榔官桂連翹空心服十二味神效忍冬湯忍冬藤龍膽草藁本羌活炙黃耆柴胡黃連酒炒甘草節川芎荊芥白芷防風潰後加人參水煎溫服十味敷方忍冬藤龍膽草仙人掌山龍甲即松樹根上綠衣地龍鱗即地龍皮刺雄黃地骨皮連翹白芷火炭草將酒糟搗碎敷瘡上四圍即止痛待痛止膿盡上生肌散可也海馬崩毒法以熱水從肘後先洗起至手六經起端處止日行數十次內服前方以瀉其毒洗至指甲尖亦不可住手看瘡勢穰方可住手蓋手三陽俱系督脈所屬洗手至穰時勢從根本而泄毒從根本而消甚勿輕視此方治發背搭手對口俱效必要初起時為之二味神仙一醉失笑散蒲公英忍冬藤各二錢以好酒煮熱儘量飲之醉仍以生蔥一根灌蜜入內要滿以灰火煨熱壓酒以被蓋睡取汗汗出而愈並治上中下三背發及三手搭並乳發立效鐵箍散亦可用中背發中背發生於背中心是因血壅出而不能歸肝心志不遂鬱熱不泄氣血積聚而成毒初起宜瘡口四圍多著艾灸勿使長益內服忍冬湯加失笑散鐵箍散皆可用多服人參敗毒散三四劑次用五香連翹湯六七劑再用排膿散敷上生肌散自愈切勿妄行鉤割慎之慎之人參敗毒散人參桔根甘草川芎白茯苓枳殼前胡羌活獨活柴胡空心服又方上中下三發背既潰周圍以麵條圍住將槐皮一大塊鑽多眼鋪於麵條上又將艾鋪於槐皮上蒸之癢則蒸痛痛則蒸癢而止後以苦茶洗淨又將輕粉三分牙豬骨髓杵膏敷之生肉神效一日一易十一味五香連翹湯木香藿香乳香沉香香附羌活獨活桑寄升麻木通連翹空心服十味排膿內補散癰疽發背潰後皆宜服之人參黃耆當歸川芎白芷肉桂夏天少用防風甘草厚朴桔根空心服十一味神仙綠豆粉湯解熱定痛之劑綠豆粉乳香沒藥桔根荊芥羌活赤芍木通連翹二花厚朴甘草空心服十一味敷方忍冬藤龍膽草鳳尾草燈心草血見愁地骨皮牡丹皮青蒿胡蓮雄黃白芷共為細末用酒糟搗爛敷患處四圍止痛下背發下背發生於兩腎眼中間系督脈太陽經所司也受在心經而五臟之毒因肝積熱於脾又飲食爆炙貪色過多以致水枯土耗故生斯毒治宜先補腎調脾先用補腎地黃湯三四劑後用敗毒流氣飲相兼而服後用排膿生肌自愈切勿割慎之八味補腎地黃湯山藥山萸熟地鹿茸牛膝丹皮茯苓澤瀉空心服可治腰腎發十六味敗毒流氣飲紫蘇桔根枳殼防風柴胡甘草川芎白芷白芍當歸酒洗羌活茯苓烏藥陳皮連翹二花酒洗空心服十六味內托流氣飲黃耆蜜炙生地酒洗白芷川芎赤芍赤茯肉桂少用防風甘草烏藥人參枳殼桔根木香連翹二花薑棗引空心服五味敷方忍冬藤酒洗生地地骨皮丹皮雄黃將好酒浸透搗爛敷患處腰背發腰背發生於兩腎眼之處由腎膀胱之所司也乃三陽之毒促人大命內損元氣外感濕熱先用補腎地黃湯三四劑後用敗毒流氣飲此二方見前再用三香內托飲定痛消毒飲綠豆粉飲十九味三香內托飲人參木香甘草厚朴紫蘇桔根枳殼黃耆蜜炙藿香肉桂烏藥當歸白芍白芷川芎防風乳香升麻乾葛空心服十八味定痛消毒飲人參當歸酒洗川芎白芍白芷枳殼麩炒茯苓半夏青油炒柴胡甘草防風羌活升麻厚朴薑汁炒二花乾葛連翹川楝子空心服八味綠豆粉湯二花酒洗豆粉蒲公英酒洗荊芥穗乳香沒藥升麻栝萎根皮空心服五味敷方地龍甲山龍甲忍冬花龍膽草雄黃以上諸藥各等分捶細末以豬膽同酒調勻敷之又方以地龍甲一味炒焦存性研末酒調敷之又方用剪刀菜捶生酒糟敷患處干即換之暗發騎馬癰暗發騎馬癰生於糞門之前陰囊之後乃手足三陽三陰表裡之所屬也因腎經蘊熱流於大小腸間熱血積而成毒若緩治即成漏瘡大小便從此而出先服補腎地黃湯二三劑方見前後服敗毒流氣飲內托追毒飲再用排膿生肌自愈十三味敗毒流氣飲人參桔根枳殼甘草防風柴胡川芎羌活白芷白芍蘇葉連翹二花姜引空心服十四味內托追毒飲川芎人參黃耆蜜炙甘草厚朴薑汁炒桔根枳殼麩炒當歸白芷防風檳榔白芍木香皂角刺引空心服九味神效車前飲車前子甘草節赤芍檳榔木通防風二花豬苓蘇葉空心服四味敷方螵蛸兒茶牛黃雄黃同生蔥搗爛敷上神效
