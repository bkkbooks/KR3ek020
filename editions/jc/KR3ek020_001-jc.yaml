body:
  text: 卷之一總論大法內經曰諸痛癢瘡皆屬於心又曰營氣不從逆於肉理乃生癰腫又曰高粱之變足生大疔又曰汗出偏沮使人偏枯汗出見濕乃生痤疿又曰開闔不得寒氣從之乃生大僂地之濕氣盛則寒皮肉筋脈即此數者而窮之則知臟腑結病之枝葉內無鬱熱蘊蓄於中外無濕熱侵害於內則氣血和平肌肉輕快癰從何來疽從何生凡治癰疽先辨虛實陰陽經云諸痛為實諸癢為虛諸癰為陽諸疽為陰又當辨是癰是疽是疔是發背然後用藥施治庶不差謬熱發於肌肉之上微腫根小不過一二寸者為癤熱發於臟腑之間腫高根闊大四五寸余者為癰五臟熱毒流於骨髓附骨而生者為疽酒食過度厚味適口心志不遂鬱熱不伸專生膊內處小孔如蜂窠皆是發也若疔毒乃五臟積熱六腑受傷或沖冒禽獸之毒剝受牛羊之穢始生黍米大不知謹護而觸犯之輕者必重重者必死用香油調雄黃末服之以攻其毒不然立見其敗矣夫癰毒發背之生有五善七惡不可不辨動靜自寧飲食知味一善也大小便均調二善也神氣清語聲明三善也膿潰腫散色鮮不臭四善也身體最和平起居如一五善也五善俱見則善無以加矣若眼白睛黑兩目緊小唇青瘡黑一惡也脛膊難轉四肢沉重眼閉口張耳聾二惡也不飲食不納藥或不知味痛極渴甚三惡也痰喘氣急面色青黑目閉口開四惡也時出冷汗恍惚嗜臥語言顛倒五惡也煩躁咳嗽腹中利瀉小便混濁六惡也腫高痛甚膿水腥臭七惡也七惡俱全則不可治五善見三則吉七惡見四則危凡治癰毒初宜解毒拔毒既潰宜排膿定痛如未潰時不可服熱藥既潰時不可服涼藥如初作者先須托裡既潰者必要排膿此治癰疽等瘡之大法也又須看其時令診其脈理辨其虛實決其輕重量其病勢斟酌用之庶不夭折如毒始作無論癰疽發背等症先須以千金托裡散服三四劑固定臟腑千金內托散亦可然後除熱以涼膈散托裡以敗毒散定痛以乳香湯憎寒壯熱以小柴胡湯嘔吐不納以人參養胃湯飲食不克以參朱養胃湯聲嘶以麥冬清音湯大便秘以大柴胡湯發渴飲水以黃耆湯穢濁觸犯以連翹三香湯腹痛以甘草芍藥湯煩躁以黃連清熱湯好眠以益氣清身湯虛弱以人參黃耆湯氣喘而咳以木香順氣湯痛甚以清肌快膚湯恍惚恐懼以鎮驚散日久不作膿者以妙濟散膿潰而腫不消者以真人活命飲清瀉不止者以真人養臟湯出虛汗不止者以黃耆固真湯徹膿以萬靈膏收口以生肌散以上病症無過於此如遇危惡之症即當灸竹馬穴數十壯實有起死回生之功又有生於內者為癰曰腦癰曰腸癰曰肺癰曰胞癰此症與前症不同醫者認驗真實然後下手不可妄用湯散以惹毒禍為害不小慎之慎之方訣俱載圖形卷中甚勿輕視凡毒於未潰之先而有前數項之症即從各症湯內加連翹梔子牛子二花皂角刺之類既潰之後而有前數項之症於各症湯內加人參黃耆二花連翹梔子春多用防風白芷柴胡川芎夏多用黃連梔子連翹麥冬秋多用黃芩蒼朮連翹梔子冬多用人參白朮連翹甘草癰疽發背之治大概如此又傷寒之症有汗而未汗者和而未和者汗滯皮膚毒阻骨髓以致發為癰症因氣血逆而不和當解毒清熱以千金消毒飲不可用膏藥貼開其毒若見危殆危如前症相同即以前法治之又有疔毒種類不同其害則一惟滿三十六種疔毒耳先當以拔毒散用之或以鐵箍散圍之內服敗毒散雄黃散之類若有變症亦同前治又有痰核癭瘤並馬刀瘡之類皆是濕熱生痰痰甚生火火甚生風風甚生熱熱甚極而病作矣宜清痰降火之劑宣熱拔毒之方初覺以艾灸之切勿妄行爛割甚矣醫之難言也若非窮通性理辨識陰陽博覽詩書曷能底造真方見今傳外科者多是鄉巷之徒不通文理之人瘍科未曾目見瘡脈未曾耳聞藥品不知性味湯散未辨君臣略知數件草之藥對人稱言通曉以誇其效希圖苟利病家吝財誠信此等付性命於庸人之手良可嘆哉諺云窮無達士將金贈病有庸人說藥方此所宜深戒也先賢曰諸經惟有少陰厥陰二經生癰疽少陽陽明生瘰癘庸人豈達二經之竅蓋由此經多氣少血故也凡診外科脈如未潰之先宜洪大拍指按之有力舉之健浮既潰之後按之宜沉健舉之宜輕浮此易收功之脈也若未潰之先脈來沉緩不疾不數既潰之後脈來健實或大或洪此難收功之脈也若前後俱得微弱之脈此危症也經年月日難獲全功須當養氣血健脾胃如參耆歸術之類若遲延不治瘡毒變而入腹既發飽滿喘氣腫脹呻吟瘡形平沒此危症也當速以千金托裡散表而出之或立馬回生散迎而奪之間或可治不然立見其禍也凡治癰腫須看有膿無膿當看正處偏處以手按之熱則有膿不熱無膿以紙浸濕貼之干處是正膿點然後持針開之勿嫌口爛以針口大而膿易盡也凡治癰癤深處深針淺處淺針何謂淺蓋症生於臍腹處若深針恐傷內膜慎之症生於厚肉之處宜深針之以瀉其毒不可不知吾見今之針發背者專行勾割去其筋膜敗肉更加痛苦此豈仁人之術哉只宜用藥調治自有愈時切勿聽此毒手自取危篤見如此者誤人甚多恐後治人有失故纂成瘍科方脈以補目之未見耳之未聞況癰疽之生皆由內蘊鬱熱外感風濕腫高大者為癰隱伏於骨者為疽三背而作者為發始生如黍米大憎寒壯熱由漸而起勿勾洗宜用艾灸多效不然先須內攻攻裡之後宣熱解毒定痛排膿生肌斂口此正道也絕房事一切牛馬穢氣不可觸觸之非輕常常聞香痛是可分如若不然痛楚難禁昧人不知付之神鬼求神禮佛有何福生智者察之不合惟修合諸藥窮究醫書藥乃百草根苗醫為九流魁首重醫者視瘍科為聖訓慳財者視此道為兒戲凡我子孫及家後醫細心診察寒熱虛實修合藥品辨別君臣庶不差謬學者須當自操附方十三味千金內托散桔根當歸川芎酒炒厚朴薑汁炒黃耆蜜炙官桂去皮白芷甘草乾葛柴胡羌活連翹防風薑棗引空心服十一味千金托裡散乳香沒藥甘草荊芥羌活獨活連翹柴胡黃耆二花綠豆粉姜引空心服此二方凡癰疽發背宜先服三四劑為妙十二味涼膈散解熱之劑柴胡連翹生地酒洗黃連薄荷黃柏甘草梔仁麥冬羌活黃芩桔根空心服十三味敗毒散拔毒之劑人參甘草川芎枳殼茯苓前胡羌活二花獨活柴胡連翹白芍當歸空心服十一味內托散排膿之劑人參黃耆蜜炙當歸酒洗官桂去皮川芎防風厚朴薑汁炒桔根二花白芷連翹空心服十二味乳香湯定痛之劑乳香沒藥荊芥黃耆蜜炙牛子當歸川芎防風白芷羌活黃柏二花雀茶引空心服五味小柴胡湯五味隨症加減治虛熱之劑人參半夏黃芩甘草柴胡薑棗引空心服六味大柴胡湯治大便秘結之劑柴胡大黃半夏黃芩赤芍枳殼薑棗引三味黃耆六一湯解穢治渴之劑黃耆蜜炙一兩天花粉大渴多用小渴少用甘草二兩水煎溫服十二味三香連翹湯解穢之劑連翹白芷二花防風白芍當歸生地乳香木香柴胡升麻雄黃姜引空心服九味人參養胃湯治嘔吐不納食人參白朮甘草蜜炒茯苓陳皮山楂神麯麥芽厚朴薑汁炒藿香加七味參砂養胃湯治飲食不化砂仁人參香附陳皮白芍甘草山楂淡竹葉三十片為引空心服三味白芍甘草湯治腹中疼痛白芍煨羌活甘草生熟各半薑棗引空心服五味麥冬養音湯治聲音嘶啞黃連酒炒麥冬梔子童便炒訶子去殼麥麵煨薏苡仁淡竹葉三十片為引空心服三味黃連清熱湯治嗜睡黃連梔子麥冬去心竹葉燈心引空心服六味益氣清身湯治好睡白連子人參白朮益智仁去殼黃耆薏苡仁空心服五味人參黃耆湯治虛弱人參黃耆蜜炙當歸白朮連翹空心服用雞蛋二枚咽十二味清肌快膈湯治痛甚羌活荊芥連翹黃柏酒炒生地酒洗白芷麥冬去心乳香沒藥薏苡仁當歸酒洗二花酒炒竹葉為引十五味妙濟散治日久不生膿黃耆蜜炙人參桔根當歸白朮連翹防風陳皮貝母白芷二花乳香沒藥甘草皂角刺不時溫服七味鎮驚散治恍惚恐懼人參白朮黃耆當歸硃砂茯神麥冬去心水煎溫服十味真人養臟湯治痢清瀉不止粟殼水泡去筋人參訶子當歸肉蔻白朮肉桂去皮木香白芍乾薑水煎空心服十四味木香順氣散治氣喘咳嗽木香厚朴青皮炒甘草蘇葉陳皮檳榔腹皮酒洗赤茯苓白芷苦參連翹貝母天花粉水煎溫服七味黃耆固真湯治虛汗自出人參炙黃耆甘草白朮防風連翹牡礪火煅薑棗引空心服太乙萬靈膏九十六味秘傳治一切外症無論大小男婦癰疽發背七十二種癰癤三十六樣疔毒並諸般無名腫毒及痰核瘰癘內損骨節外傷皮肉手足麻木不仁走注疼痛俱貼之大有神效也大蜂房一個石菖蒲五錢青木香一兩蜈蚣三條敗龜板自死四五個何首烏一兩穿山甲三兩烏梢蛇蛻三條過山龍一把或以鬼見愁代蛇床子五錢蒼朮禾一把蠶蛻酒洗一錢皂角刺五錢大風子一兩去殼香附子五錢制蟬蛻二兩半邊蓮一把或以佛孔草代天花粉一兩龍膽草二兩女人頭髮二兩蒲公英二兩木鱉子一兩去殼地骨皮一兩槐花二兩忍冬藤二兩鼠黏子五錢蓖麻子一百粒去殼槐角二兩青蒿一把細辛五錢升麻一兩赤芍五錢黑醜一兩艾葉一把白芷二兩花椒五錢甘草二兩柴胡五錢防風五錢玄參一兩雀茶五錢大戟二兩白蘞一兩南星生一兩白芨一兩桔根二兩草烏生一兩羌活一兩獨活一兩黃耆五錢川烏生一兩昆布五錢肉桂五錢漏蘆五錢巴豆去殼五錢荊芥五錢斑蝥一百個連翹五錢黃柏一兩黃連一兩槐葉一把上藥為片取槐桃柳枝各七根香油五斤春浸五日夏秋三日冬七日入鍋煎以煙盡為度用皮紙濾過再入鍋以文武火煎槐枝不住手攪下黃丹十兩密陀僧研末一兩五錢以滴水成珠為度入後藥麝香二錢乳香沒藥各二兩二味以筍衣盛著炙乾為末海螵蛸一兩雄黃一兩硃砂一兩血蠍五錢兒茶二兩青魚膽四斤重要臘月的一個珍珠五錢琥珀五錢牛黃五錢白芷一兩山奈一兩甘松一兩樟腦一兩赤石脂一兩白石脂一兩龍骨煅一兩枯礬五錢檳榔末五錢輕粉二錢水銀五錢龍泉粉磨刀石漿泥一兩雞內金炮五錢猩紅五錢金箔五十片百草霜五錢熊膽一錢各味用盂缽擂細入煎膏內攪勻瓷器內收貯埋土內七日取出任意聽用十八味生肌散治一切癰腫大小無名腫毒膿出不幹用此敷之敗肉自脫新肉自生雞內金十個龍泉粉五錢熊膽二錢雄黃一兩硃砂五錢沒藥一兩海螵蛸一兩乳香一兩兒茶一兩血蠍五錢牛黃二錢龍骨煅五錢麝香一錢珍珠一錢赤石脂煅一兩白石脂煅一兩蛤粉五錢白芨一兩金箔四十片共研極細末用陳茶洗淨患處後敷藥七日平復神效十五味羌活勝濕飲解流注之毒白芷荊芥獨活蒼朮黃柏升麻連翹甘草羌活黃耆桔根白芍當歸防風桂枝姜引水煎空心服十五味千金消毒飲治傷寒流注之熱柴胡前胡連翹黃連川芎枳殼茯苓人參甘草炙黃耆黃柏肉桂防風白芷二花薑棗引空心服四味拔疔散此藥拔疔毒雄黃一錢硃砂一錢二味研末以羌活黃連煎湯調服四味鐵箍散雄黃一錢硃砂一錢牛黃一錢麝香一錢共研細末疔初起用七醋磨好墨調搽潰後用水磨墨調之圈疔四圍十一味雄黃敗毒散治疔毒雄黃人參羌活黃耆蜜炙甘草連翹黃連蓮肉硃砂柴胡黃柏酒洗燈心引空心服十六味加減托裡散治諸痛入腹羌活獨活人參柴胡黃耆連翹白朮甘草桔根白芍肉桂黃連白芷荊芥二花杏仁薑棗引空心服十六味立馬回生散治諸毒入腹綠豆粉二花酒炒人參甘草當歸酒洗雄黃硃砂黃耆蜜炙荊芥連翹桂枝白芍桔根川芎白芷防風薑棗引空心服神仙去毒一掃丹雄黃二錢硃砂三錢牛黃二錢麝香八分共研末豬膽調勻厚敷毒上以桐油浸紙燃火近毒處熏照之須令熱氣透毒其毒自散痛自止能治大小一切癰腫發背瘡癤並無名腫毒赤紫丹瘤纏喉風初起散之已潰掃之藥品少而功效靈真仙方也神仙敷毒失笑餅黃泥一大團連根蔥一大把蜂蜜一鍾雄黃一錢共為末搗成泥餅敷毒上如干即換之能治男女一切癰疔腫毒初起用此敷貼消腫退熱神效神仙拔毒忍冬花酒忍冬花一把蒲公英一把雄黃一錢乳香一錢沒藥一錢以好酒一瓶煮藥十餘沸再入白蜜四兩蔥七根又煮三四沸去蔥儘量飲醉被蓋臥睡出汗為度治男女一切癰腫初起服此立效以上三方真秘傳須珍重之
