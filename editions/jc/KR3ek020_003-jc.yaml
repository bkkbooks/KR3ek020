body:
  text: 卷之三背圖形八症二對口上搭手脊骨第三節旁開寸半肺俞穴中搭手脊骨第四節旁開二寸膏育穴下搭手脊骨第十四節旁寸盲門穴囊發蛇頭疔天蛇頭毒膝發對口對口瘡生於橫山骨下百勞骨上正對口生是也其痛不可當上連腦頂下徹心肝乃手足三陽三陰之所司也治之不善必死因思慮過多鬱熱不伸炙爆多傷故生斯毒始生宜海馬崩毒法並灸肘尖穴神闕穴各十餘壯甚效用祛毒一掃丹方見前後服三香內托飲方見前定痛拔毒飲內須排膿定痛外須收口生肌先宜服益腎制火湯不然脛項筋脫腎水耗散心肝熱熾而斃十三味益腎制火湯黃柏鹽炒連翹知母鹽炒地黃甘草白芍肉桂去皮當歸黃連川芎人參黃耆白朮空心服十三味定痛拔毒飲羌活牛膝黃耆白芍甘草乳香柴胡香附前胡蘇葉黃芩枳殼二花空心服五味敷方忍冬藤龍膽草百草霜上京墨地骨皮酒搗敷之正背發正背發生於當心中不上不下不左不右正對心脾比諸毒尤甚與對口相同乃通身經絡所屬也不宜勾割治與諸發背同上搭手上搭手生於匙骨之下去背溝一指是也乃手足太陰太陽之所屬也去肺膈不遠不可勾割由下元枯竭上焦積熱宜滋陰降火三香內托飲方見前加黃柏知母連翹二花定痛拔毒飲方見前加黃柏知母梔子二花牛子連翹花粉黃芩湘蓮而服排膿定痛而愈八味白芷散連翹白芷乳香黃柏升麻沒藥羌活二花竹葉引空心服九味敷方生地牛膝二花仙人掌半邊蓮龍膽草清涼膏雄黃連鬚子以酒糟共搗敷患處中搭手中搭手生於背中心離三指之間亦手足三陰三陽之所屬也離臟腑亦近不可用刀針因腎不足而心有鬱熱故生斯毒宜順氣開鬱清熱追毒先服三香連翹湯次服定痛清氣湯然後排膿生肌九味三香連翹湯香附酒炒木香乳香羌活連翹牛子二花當歸白芍空心服十六味定痛清氣湯人參黃耆白朮土炒連翹生地當歸木香乳香沒藥桔根白芷川芎麥冬羌活二花皂角刺空心服生肌妙方獖豬骨髓輕粉一分用青布蔸定捶膏貼之神效五味敷方生地忍冬膽草黃柏雄黃以酒糟搗爛敷之囊發囊發發於陰囊之上乃足厥陰之所屬也其病亦酷因心勝陰虧濕氣下流故生斯毒用青荷葉包之或紫蘇葉洗淨去毛包之若無以油單紙將兒茶水煮過包之亦可內服十三味流氣敗毒飲外上敷藥十三味流氣敗毒飲澤瀉川芎赤芍蘇葉甘草麥冬香附白朮茯苓青皮防風柴胡羌活空心服三味敷方海螵蛸兒茶蛤粉共為末干敷或生肌散亦可二味敷方乾荷葉干蘇葉焙乾等分為末酒調厚塗肉上亦可外以油紙包之效蛇頭疔蛇頭疔生於大指之上三四指亦生因五臟熱邪蘊積故外發於六經起指之端宜瀉六經熱毒須服連翹泄毒湯外用敷藥初覺以獨腳蓮煎水洗之可消既潰不用十三味連翹瀉毒湯連翹青黛木香羌活桂枝黃連麥冬甘草五味子薄荷白芷防風紫蘇空心服敷藥敷藥用豬膽調雄黃搽蛇頭疔詩蛇頭瘡作痛連心日夜呻吟不得寧豬膽雄黃筒指上痛苦熬煎自覺輕天蛇頭毒天蛇頭毒生於中指頭乃心經積熱邪毒攻指初覺以芋禾煎水洗五六次之間用芋頭禾竿焙乾研末搽內服十一味托裡流氣飲十一味托裡流氣飲人參肉桂去皮少用白芷當歸連翹黃耆防風川芎白芍厚朴木香一味敷方久雨後籬笆下糞草上所生小菰其色似水紅形似古竹簪連根焙乾為末無論已潰未潰如瘡口乾用麻油調搽濕用乾末敷上神效膝發膝發生於兩膝之上乃足少陽經所屬也似乎人面瘡有窠穴又有口眼甚是可畏由心肝壅熱下流胯膝故生斯毒宜用拔毒流氣飲後用排膿生肌若經七八年不愈者由此跛足為喪身其禍不淺矣十九味拔毒流氣飲黃柏鹽炒防己川膝酒炒木瓜紫蘇木香白朮二花黃連麥冬前胡檳榔牛子大腹皮甘草赤芍首烏川烏制地骨皮空心服十一味防風牛膝湯川膝木瓜檳榔木香乳香防風黃連甘草花粉白朮人參空心服此方洗瘡尤效二味敷方將貝母為末檳榔磨水調搽以萬靈膏生肌散敷之效外方治鶴膝風糯米煮飯酒並曲三味共搗敷痛處三日即愈又對口瘡方用剪刀菜捶生酒糟敷之幹了再換即愈
