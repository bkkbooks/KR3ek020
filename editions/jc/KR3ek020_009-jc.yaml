body:
  text: 卷之九瘤症總論瘤症圖形十一症粉瘤可治中粉瘤不可治筋瘤不可治肩瘤不可治肘瘤可治脅瘤不可治乳瘤可治發瘤可治腰瘤可治腿瘤可治拐瘤可治瘤症總論或問曰子云外症分門類治其立意勤矣用心仁矣古之外症又有所謂瘤者不知從何而起從何而成未嘗有痛癢苦楚無寒熱膿血之災突然而生如有物伏於其中大便於人者是何而然也答曰瘤者流而積積而聚聚而成也乃人身之滯氣濁血結聚而成也如李如桃而形狀不同如瓜如瓠而名色不一古稱有六曰骨瘤曰脂瘤曰膿瘤曰血瘤曰筋瘤曰石瘤以其瘤之中有此物故指其實而名之也今原圖形一十三症證其所生之處而言之也其瘤中所伏之物亦不過六者之聚而已或又曰子云是矣治之亦有方乎答曰百病皆自內發於外古人治病用膏藥以攻內針灸以攻外皆祛也今瘤之所生由滯氣濁血所成豈無藥以祛之內服湯藥外貼膏藥內外交攻表裡並治瘤可愈矣切不可妄用針刀勾割恐膿血崩潰多致夭亡慎之慎之十七味大流氣飲治諸般瘤症無論頭面胸背手足通用皆效人參黃耆當歸川芎肉桂厚朴白芷甘草桔梗防風烏藥檳榔白芍枳殼木香紫蘇青皮薑棗引瘤在上食後服在下食前服七味昆布散海藻昆布俱用酒海石飛過海粉白芷青黛浮麥加海馬共為末掌上咽之或蜜丸如杏核大食後以酒咽一丸二味白芷膏石灰如銅錢大一塊糯米十四粒二味俱用鹽水化開入辰砂末澄片時用此點之四味梅花片散片腦血蠍黃丹寒水石共為末搽於瘤上十二味龍珠膏此膏治諸瘤頗效宜量勢而用若眼上喉下乳下宜斟酌之龍芽草三兩棘棗根五錢海藻五錢蘇木五錢共為末水二十碗煎至十碗去渣又用桑柴灰二碗麵灰一碗蒼耳子草灰二碗用草紙放羅底上用前藥水煎熱淋取灰汁十碗澄清入鍋內微火熬成膏用巴豆霜白丁香寸香輕粉攪勻瓷器收貯每取敷瘤去舊藥敷新藥如此敷數次其瘤自潰用萬靈膏徹盡膿水上生肌散而愈治癭瘤方即氣頸也昆布海藻海帶海馬米泔水浸漲各二兩穿甲土炒石燕醋煮七次黃藥燒淨土焙乾各二錢共為末蜜少加面為丸如黃豆大每服五至十丸以木香磨水吞之又方螵蛸昆布海金砂冬花木香水晶石海帶夏枯草各五錢海馬一個石燕一兩共為末再用黃藥引酒送下又方海藻一兩昆布一兩海馬三個石膏三錢螵蛸一錢八分木香三錢陳皮三錢黃藥子二兩共研末黃藥湯送下忌生冷鹽又方昆布螵蛸海帶各四兩黃藥二兩小茴五錢小草五錢木香三錢共為末飯後連送下三茶匙又方昆布半斤用米泔水洗海藻一斤醋製海馬一對醋煅石燕一對火燒向醋中焠之自然榨細海螵蛸三錢夏枯草子一兩即紫背天衢子是也醋炒一人只用五錢研末酒送下
