body:
  text: 卷之十小兒圖形九症肥瘡軟癤癩頭瘡月蝕牙核疳夾腮耳疳赤遊風白遊風肥瘡肥瘡多生於小兒頭上用糯米蒼朮等分炒成炭研末油調搽詩肥瘡最是小兒生糯米蒼朮各等分共炒成炭來研末油調敷上最安寧軟癤軟癤生於小兒頭上用茶湯洗淨膿血以酒麴研調雞子清搽詩小兒軟癤甚堪憐酒麴研調雞蛋清茶湯洗盡來敷上不消三次自然寧癩頭瘡癩頭瘡用羊屎燒灰天雁油敷先以竹潦水洗之展干詩小兒癩頭莫胡求羊屎燒灰天雁油竹潦水中去洗淨展干發上敷先瘳月蝕瘡月蝕瘡即走馬牙疳也內用涼膈散外用搽藥涼膈散黃連黃芩梔子連翹甘草桔根薄荷若火甚加大黃芒硝竹葉燈心引水煎食後服搽藥方乳香二錢沒藥二錢兒茶血蠍螵蛸各一錢枯礬五分石脂七分蚊蛤三分地蝨婆五分麝香五釐紅鶴片不拘多少羊馬棒即刺公頭開紅花是也人中白不拘多少上片五釐百草霜五分共研細末搽之外方地骨皮去皮枯礬焙乾為末搽之牙核疳牙疳生於牙根上涎流疼痛用陳便桶木枯礬研爛核灰雄黃調搽即時消夾腮夾腮生於耳根用雄黃生蒜黃泥捶成餅敷毒上詩夾腮生於耳根起雄黃生蒜及黃泥捶來成餅敷毒上三朝之後痛全移核疳核疳流水地角潰爛用雄黃枯礬明粉螵蛸乳香蛤粉青魚膽敷之詩核疳流水地角爛雄黃枯礬並螵蛸乳香蛤粉青魚膽叫君間散兩頭歡赤遊風赤遊風手上生黑點極痛極癢用生薑陳艾槐葉煎湯洗之詩赤遊手上生黑點痛癢時時口叫難生薑槐葉煎湯洗又加陳艾病即痊
