body:
  text: 卷之八面圖形十五症上眼丹下眼丹白麵疔須毒乳癰夾脅心腹肚癰肚便癰在小腹之側手心毒手腕毒便毒即魚口在馬胯眼內鯉魚便毒在內胯之側鶴膝風膝腿毒腳拐毒在踝骨之上上下眼丹上眼丹生於眼胞之上下丹生於眼胞之下赤腫而痛癢不一若不治恐成膿流壞眼目乃心肝積熱毒氣上衝血壅而成也宜鹽炒菊花隔紙尉之或鹽炒隔紙貼之內服清肝流氣飲清心黃連丸治之十六味清肝流氣飲羌活防風茯苓甘草柴胡川芎當歸青皮荊芥紫蘇蔓荊子赤芍麥冬連翹蒙花石膏食後服頭湯二湯洗丹七味清心黃連丸甘草黃連防風連翹羌活細辛菊花各等分為末煉蜜為丸如梧子大每服五十粒空心服茶湯送下白麵疔白麵疔生於兩頤之間正面之上由寒積久生風風生熱熱生氣上衝於面而生斯毒先宜鐵箍散方見前後用追毒托裡飲或狗寶丸更妙十八味追毒托裡飲紫蘇桔梗枳殼甘草防風柴胡川芎羌活白芷白芍連翹當歸犀角乳香沒藥黃連二花雄黃薑棗引空心服四味狗寶丸蟾酥一錢片腦一錢狗寶二錢乳香二錢共為末酒糊為丸如梧子大每服一粒蔥三根和藥咽之以熱送下汗出為度須毒須毒生於上唇有須之處乃脾肺有熱毒氣結聚而生初宜用鐵箍散潰用生肌散內服清肝流氣飲方見眼丹乳癰乳癰生於正乳之上乃厥陰陽明經之所屬也初起必癢用艾灸十餘壯可消若成大毒法同乳吹何謂乳癖蓋硬而不痛如頑石之類經三四月而成挾脅挾脅生於兩脅之下乃肝經積熱氣血不行而生初覺用一掃丹失笑餅若內消稍遲則不可也只用清肝流氣飲方俱見前外用敷藥三味敷方過山龍山芋頭山藥酒搗爛青布包之心腹肚癰心腹肚癰生於正肚之側去臍一掌乃心脾經風熱愈甚氣血壅聚而生宜三香追毒飲清心追毒湯潰後用萬靈膏膿盡則用生肌散十九味三香追毒飲羌活連翹甘草花粉紫蘇白芷防風二花肉桂黃耆茯苓乳香木香沉香芍藥鬱金生地枳殼前胡食後服十四味清心黃連湯黃連麥冬肉桂香附白芷桔梗枳殼連翹當歸川芎紫蘇羌活黃柏忍冬草食後服肚便癰肚便癰生於小腹之側乃肝腎二經之所司也緣飲酒貪色腎水不足相火內動鬱熱不伸下流小腹故壅結而成也初起用神仙失笑餅潰後用萬靈膏膿盡上生肌散內多服清熱追毒飲滋腎消毒湯十五味清熱追毒飲羌活乾葛黃芩白芍當歸赤芍花粉生地連翹紫蘇黃柏知母甘草二花車前草空心服二十味滋腎消毒飲人參黃耆當歸柴胡青皮前胡黃柏知母黃連梔子連翹骨皮腹皮五味子二花乾葛生地白芍枳殼陳皮空心服手心毒手心毒生於兩手掌心乃厥陰心經之所司也治之不善去死不遠蓋由心經燥甚血熱妄行肝風鼓舞毒長四肢加以憂思酒色過度遂使毒流骨髓侵入勞宮治宜定痛消毒飲內托流氣飲千金追毒飲乳香反魂湯外敷以萬靈膏後用生肌散收功不然見筋骨斷而斃矣十三味定痛消毒飲紫蘇白芍藥川芎甘草桔根烏藥白芷防風羌活獨活茯苓連翹桂枝薑棗引食後服十八味內托流氣飲人參木香當歸川芎黃耆芍藥防風甘草厚朴枳殼桔根白芨烏藥連翹黃芩檳榔紫蘇腹皮薑棗引食遠服八味千金追毒飲人參黃耆桂枝乾葛連翹黃連升麻二花每劑重二三兩食後服十五味乳香返魂湯乳香雄黃乾葛首烏當歸木通赤芍白芷茴香沒藥甘草枳殼木香黃耆二花薑棗引食後服六味敷方龍泉粉白芷螵蛸石脂熊膽麝香用皮樹汁煎藥成膏調勻以油紙攤膏貼之手腕毒手腕毒生於掌後交骨之間蓋由心生熱肝生風風熱壅甚血氣燔灼又兼喜怒憂恐感積於心而生此毒當用定痛消毒飲內托流氣飲若毒貫透手心手腕者此心毒流於骨髓乃危症也急以三香托裡飲救之或乳香返魂湯方見前外貼萬靈膏後上生肌散若痛甚以乳香散熏之十八味三香托裡散乳香木香大黃人參黃耆甘草紫蘇桂枝乾葛烏藥當歸桔根防風花粉白芍二花升麻玄參食後服十四味乳香散乳香沒藥雄黃二花川芎蒲公英草烏木鱉艾葉桃葉白芷青蒿葉何首烏麝香少許上藥搗爛成團用瓦器盛著燒煙燻之或煎水洗亦可便毒便毒即魚口生於馬胯眼內男婦皆有之乃厥陰肝經之所司也因酒色過度或坐臥濕地或濕熱浸透而生此毒魚口者開而不合也治之不善經年不愈始以一掃丹失笑餅內服木香消毒飲可內消而愈如遲追以人參敗毒飲黃耆解毒湯既潰用萬靈膏生肌散忌行動不易合口此毒有公母之分公者小而長易治母者圍而大難治公則無子母則有三四子先生母毒子別列於外以艾灸三四壯其子即隱次第服藥除其後患矣二十二味木瓜消毒飲木瓜乳香枳殼紫蘇白芷檳榔防風木香腹皮川膝肉桂連翹甘草防己黃耆川芎當歸白芍二花小茴羌活柴胡空心服二十味人參敗毒散人參甘草川芎茯苓枳殼前胡羌活獨活柴胡木瓜乾葛防己牛膝檳榔腹皮黃連黃柏豬苓麥冬梔子空心服鯉魚便毒鯉魚便毒即魚口也生於兩胯之側陰頭盡處乃腎與膀胱之所司也蓋由濕熱透於膀胱酒色過度傷於脾腎治如便毒初起用黃柏二兩蒼朮一兩此二味以豬膽汁搗敷之鶴膝風鶴膝風生於膝頭之上由腎肝積熱傷筋或坐臥濕地或熱足過水或為風熱所傷而生初起如拳久如盤樣治之若緩遂成漏膝初起以艾灸之或著敷藥內服木瓜消毒飲紫蘇流氣飲外貼萬靈膏可愈不然恐成跛足矣二十二味木瓜消毒酒木瓜檳榔牛膝防風川烏甘草烏藥肉桂蒼朮黃柏羌活赤芍木香當歸川芎紫蘇二花白芷連翹骨皮加皮腹皮以絹袋盛之懸酒罈煮三四日之後一七之內如常飲之以肉食壓之忌鵝羊雞魚鮮物十七味紫蘇流氣飲紫蘇川朴甘草烏藥檳榔枳殼川烏防風白芍牛膝腹皮木瓜黃柏木香蒼朮草烏二花薑引水煎空心服十六味敷方牛膝車前二花益母大腹皮龍膽草燈心草地骨皮五加皮牡丹皮生薑皮南星當歸頭香附川烏通草諸藥先搗爛用好酒做成餅厚鋪紙上貼之膝腿毒膝腿毒生於下側去膝不遠亦由濕熱所傷血聚成毒治同鶴膝風若緩則成漏膝矣腳拐毒腳拐毒生於腳筋骨之上因濕侵骨風傷皮或因刑挾棒所傷或因物傷經久不愈亦成此毒宜貼萬靈膏徹盡膿血再以椒茶鹽湯洗可愈
