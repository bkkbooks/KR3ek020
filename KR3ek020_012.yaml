body:
  text: 卷之十二婦人四症血風瘡陰蝕乳發頭風頭風症頭風症惟婦人最多蓋由産後敗血過甚而傷風受冷或月水來多而受濕感寒血氣虛弱風寒來頂致頭鬆弛而畏冷怕風腦如空筒而髓枯血乾炎天裹包怕寒目如瞑脹痠痛不止宜人參四物湯黃耆補虛湯防風勝濕湯更灸風池穴巔頂穴可愈十一味人參四物湯人參當歸熟地白朮川芎甘草細辛升麻白芷紅花白芍薑棗引食後服十七味黃耆補虛湯黃耆白朮人參甘草茯苓羌活熟地蒼朮黃芩紅花藁本川芎白芷桔根荊芥菊花防風薑棗引食後服十九味防風勝濕湯防風紅花當歸黃柏蒼朮肉桂乾葛升麻羌活細辛白芷黃耆甘草白朮熟地白芍川芎石膏人參薑棗引為丸亦可食後服婦人頭疼方婦人頭疼心中潮熱飲食減少服此方神效川芎一錢當歸酒洗一錢白芍八分生地一錢熟地二錢丹皮三錢陳皮二錢雲苓一錢寸冬去心一錢香附炒一錢元胡一錢甘草六分伏毛鹽水炒一錢川膝二錢骨皮一錢血風瘡血風瘡生於兩頤後之間痛癢不一膿水常流蓋由産後受風而然也內宜防風勝濕湯方見上外用螵硝散可愈萬靈膏亦可五味螵蛸散敷方石脂兒茶血竭枯礬螵蛸共研末敷毒上隔紙膏黃丹黃蠟五錢白蠟陀參水粉各五錢以桐油一鍾清油一鍾將前藥加頭髮入油內熬成膏用傘紙刺眼先貼皮肉上又將藥膏貼之甚效陰蝕陰蝕生於陰戶之內人門之中一癢則痠麻徹骨一痛則痛苦酸心皆由産後保護不慎以致風寒內逼或月經調治失宜遂延濕熱中生或産日未滿而交合或月經未住而行房或惹男子疳毒內生熱症種種不一宜清熱流氣飲川楝祛毒湯服之雞肝散插之草麻湯洗之艾煙燻之外此而不知求醫則子宮散而陰戶亦脫逐致不起者多矣十八味清熱流氣飲紫蘇牛膝木通豬苓黃柏知母車前子二花牛子連翹赤芍羌活蛇床子甘草當歸木鱉紅花生地燈草引空心服十七味川楝祛毒湯川楝子車前子蛇床子栝蔞子白芷木通大腹皮地骨皮五加皮紫蘇黃柏當歸羌活連翹麥冬紅花葵花空心服九味雞肝散臭蕪荑蛇床子硫黃朝腦花椒枯礬雄黃螵蛸黃連共為末取新雞肝搽上藥末乘癢時插入陰戶之中亦可愈十味草麻湯萆麻子柏葉槐葉柳葉桃葉白芨白芷升麻防風麝香煎水入盆中熏洗不然曬乾為末燃著入穢桶內令坐其上勿通氣燃熏一七個時辰方住乳發乳發之毒丹乳發未潰不能穿頭疼痛難忍將新鮮天南星一個只用一半以酒糟和搗敷一晝夜去其腐肉然後用肥肉煮熱切片貼之生肌甚效乳發消毒飲方麥冬二錢茅根三錢齊頭蒿一把水煎服附雜症便方風火雜眼神方蘇木歸尾羌活各五錢黃連硃砂銅緑膽礬玄明粉各三錢此八味不可加減共為細末以細青布包裹幾重入碗內放在微火之中將水浸出汁來連洗三次神效治腳汗方白附子煮爛加皮硝再煎滾溢洗二三次神效治大麻風方初起時用桐子白火上燒存性放鋤頭板上熬成膏以紙攤膏貼患處又方通天丹內加蘄蛇在內名通天散用苦參十餘斤不沾鐵銅器挖時仔細如恐沾鋤頭處用檀木捶向石楞上除去黏鐵苦參用蕨碓舂細糯米泔水浸七日一日一換用柳木甑蒸過曬乾缸片焙焦磨粉用之每一料用苦參粉一斤加枳殼三錢天仙子三錢炒時有香為度煉密用熟蕎麥粉入內糊丸白水下再用烏梢蛇去頭尾皮刺以獖豬肉伴和為丸服之又方用賴蝦蟆一個入鴨肉煮熟去蟆食肉汁洗遍身吃後用青布衫穿著蟲盡沾於布衫上效又方生薑蔥各四兩陳屋瓦草一斤黑羊屎三斗煎水洗取汗禁風哽疾方用活壁虎一隻放在碗內用鍾子蓋定將好燒酒燒熱衝入碗內壁虎不用服酒出汗效蛾子方用喜蛛子窠將瓦焙乾為末吹效軟癤方七絶小兒軟癤甚堪憐將針挑破用燒鹽打細塊如緑豆大入在癤內自愈全貼腫毒方用梧桐葉將白水煮三炷香火俟葉冷貼患處甚效紅汗並及蛾子方用杖藜磨水吞之效鵝掌風方鵝掌風由於陽明經火熱血燥初起紫斑白點久則皮膚枯厚破裂不已二礬湯熏洗即效此方輕則不宜越重起效白礬加皂礬四兩兒茶五錢側柏葉半斤用水十碗煎數沸候用先以桐油調搽患處將油紙點著以煙焰向患處熏之片時方將前藥湯乘滾貯桶內手架上以布蓋手於湯氣上熏之勿令泄氣待微溫傾入盆內洗之良久一次可愈七日忌下湯水永不再發又方川烏草烏何首烏天花粉赤芍防風荊芥蒼朮地丁各一錢艾葉四兩銼碎水煎熏熏後洗立效又方核桃殼鮮者更佳鵓鴿屎等分煎水頻洗立效又方白豌豆一升入練子同煎水早午晚洗每日七次痊愈又方用黑鉛不拘多少打成片熬一柱香時入緑豆一碗再煮爛去渣以水乘熱洗數次立效或搽亦可乳島蛾方用巴豆一粒研爛用竹紙為捻又以香油潤透燃灼吹滅噙於口內煙往喉即愈矣又方用白鮮皮入口內嚼爛手搓之立效心氣痛方豬牙皂飛過火煅存性甘松五錢北細辛五分俱為末加真元寸三分研細入瓷缸內收貯凡男婦氣痛每用三分如寒氣痛以火酒調服如陽性氣痛以熱水調服水泄之人勿用胃氣痛方用栝蔞子一個內的仁炒熟以仁煎酒連服六七日神效又胃氣痛重者方砂仁木香五靈脂各一兩廣皮九分丁香一錢俱不見火為末每服三分半滾酒水下不可多服湯泡火燒方雞蛋七個煮熟留黃其白與患者吃用麻油煎黃為膏黃似果炭去黃不用其油搽上愈又方用大黃為末以雞蛋清調搽神效裙褊瘡方鳳凰衣二錢黃柏二錢亂髮二錢人乳一鍾麻油一碗熬隔紙膏貼之又方陀參五錢黃柏五錢青礬二錢五分共為末麻油調敷效又方團魚殼煅存性五錢入冰片二分麻油調搽如濕干敷效又方白松香一兩灌紅一兩生熟石膏各五錢枯礬一錢共研細末桐油調青布攤膏貼之先用松枝蔥根花椒煎水洗淨後貼此藥又方川松香末一兩苦參末調搽之效血風瘡癬方百合百草霜捶膏貼之木香檳榔保和丸最能和脾胃除飽脹避穢氣可常用妙大小男婦宜服之在廣東廣西者必當吃之公檳榔木香半夏杏仁郁李仁去殼陳皮去白連翹各二兩神麯四兩大腹皮酒洗四兩俱為細末煎水攪米糊為丸如梧子大每用二錢滾水下牙痛方蔥五根黑黃豆一撮艾焙熟三錢煎水噙愈下疳楊梅瘡一慨具效方防風荊芥梔子連翹桔根生地歸尾蟬蛻七個黃芩土茯苓五錢天花粉槐花各五錢川連五分大黃三錢姜引水二碗煎至一碗食飽服忌生冷發物腫毒托裡方歸尾梔子連翹川柏各二錢二花三錢桔根一錢皂刺二錢乳香五錢甘草三錢黃耆赤芍牡蠣各二錢水煎服按上下分飲或食前後服再托裡方西江月羌活連翹枳殼烏藥甘草麻黃茯苓地丁最高強漏蘆當歸為上哪管發背癰疽不論惡毒疔瘡一貼汗透便安康勝似黃金萬兩接骨方楊樹根四兩包術根四兩花椒樹根四兩地骨皮四兩望腫消根四兩上藥共搗爛為餅餅上量加糯米飯一碗飯上又加酒酹一丸碎糝飯上酒酹上又用地蝨婆七個捶碎放酒酹上然後將酹這一面貼在患處外用布緊緊卷好俟至將一對晝時便須作急解去恐久則皮上起泡也此後便愈腫毒並流痰方此方作末藥先服沉香一錢五分木香五分檳榔五分沒藥七分五釐乳香六分五釐大黃二錢五分穿甲一個半二花五分皂刺一個半如瘡未潰頭用此藥則去其尖共為細末生酒化服次服藥方厚朴歸尾荊芥羌活防風青藤赤芍草烏前胡柴胡陳皮白芷蒺藜麻黃甘草以上俱要三七錢惟麝香只用三二分用黑豆一歲一粒為引病在頭加茯苓引病在右加柴胡引病在左加前胡引病在足加牛膝麝香引在腰加杜仲引要用生酒煎服出汗治漏管方用九齒鱉甲一個燒灰以玉簪花根末調點上又用藥線取管白砒二錢薄荷三錢入瓦罐內炭火燒紅候煙盡加明礬末六錢煅枯上加乳香沒藥各一錢亦候煙盡共取起打碎如緑豆大復用川烏草烏何首烏南星半夏防風各三錢煎汁煮前所煅之藥候汁干取起加雄黃一錢冰片麝香各二分共為末麵糊藥線入漏孔內每日三換上七次其管自出治小兒脫肛方黃連生地各二分木通連翹梔子薄荷各三分甘草一分石膏一兩防風五分燈心引治半身不遂方地骨皮五加皮羌活故紙黃芩防風牛膝枸杞杜仲川芎青皮以上各味各二錢五分南星靈仙木瓜蒼朮歸尾藁本細辛花粉苡仁各一錢五分穿甲炮灸一錢七分甘草節一錢五分白朮二錢茯苓一錢川芎一錢乳香五錢沒藥五錢上藥用生酒一斗煮三炷香隨量飲發汗一次發汗平地量病人長短將桑柴燒地上又用乾草鋪好上施褥子病人先儘量飲藥酒後以棉被矇頭睡於其上發汗俟汗發後不放露頭俟汗乾後方可起來發汗只用一次如二次飲酒則不可發汗矣
