body:
  text: 卷之六側圖形十一症眉風毒耳門癰耳根癰核癰中肩發大腰帶內肘毒外肘毒內臁外臁丫指毒生於大指丫內眉風毒眉風毒生於兩眉之間乃脾肺濕熱沖聚於眉峰也內服敗毒流氣飲外貼萬靈膏若破上生肌散宜用燈火甚妙十三味敗毒流氣飲羌活獨活桔梗紫蘇川芎當歸白芷防風升麻柴胡黃連黃芩白芍食遠服耳門癰耳門癰生於兩耳之門邊乃肝腎蘊熱上炎耳門而生宜內服清肝滋腎飲外貼萬靈膏又上生肌散若初起時用神仙祛毒一掃丹敷毒失笑餅方見前十一味清肝滋腎飲柴胡升麻黃柏青皮羌活獨活白芷地骨皮荊芥桔根黃耆食遠服耳根癰耳根癰生於耳根下牙根上乃少陽陽明火甚而然宜瀉二經之火用清肝消毒飲初起用神仙敷毒失笑餅更灸頰車肩井穴各三壯十三味清肝消毒飲柴胡升麻前胡防風玄參桔根黃連白芷石膏川芎黃柏生地羌活食遠服核癰核癰生於地角之下由心肺積熱初起赤腫如盤多著艾灸可消內服解毒黃連湯外用敷藥若潰用萬靈膏生肌散不然恐成漏核之患矣九味解毒黃連湯升麻羌活桔梗甘草黃連梔子黃柏連翹黃芩食後服六味敷方忍冬草燈心草地骨皮過山龍遠志肉車前子共搗爛用青布包蔸之中肩發中肩發生於肩膀之中近肘後玉池之地乃心肝積熱而成也內服托裡流氣飲外用神仙失笑餅若潰後用萬靈膏七味托裡流氣飲羌活白芷桔根黃連肉桂柴胡黃芩食後服大腰帶大腰帶生於肚膀骨下離奶五寸有餘初起如桃漸漸赤腫因濕熱所傷心肝脾三經當速解毒不然漸漸沿腰如索纏轉後破痛苦難當也名曰龍癬瘡用敗毒流氣飲千金救苦飲消毒飲治之後以萬靈膏生肌收功十四味敗毒流氣飲紫蘇川芎當歸人參黃耆甘草羌活獨活荊芥桔根黃連白芷防風連翹食遠服二味短毒截腰法白芨一兩明雄一兩共為末雞蛋白調搽十一味千金救苦飲羌活白芍蒼朮米泔水浸連翹黃連桔根乳香沒藥木香白芷升麻食遠服三味消毒飲石榴根皮棠梨根皮地骨皮共煎水洗內肘毒內肘毒生於肘後內側乃六經熱血凝滯而生初起內服木香敗毒飲外上清消毒散敷之若腫潰以萬靈膏貼之可愈外肘生於肘後外側與內肘毒治同十味木香敗毒飲木香膽草二花當歸地骨皮川芎桔根荊芥羌活甘草食遠服七味上清消毒飲即敷方龍泉粉雄黃大黃黃連黃柏黃芩白芨共研末雞蛋清調搽內臁內臁生於兩足臁骨內由濕熱而生或撞破皮膚潰爛而成痛癢不一宜用炒鹽和椒茶煎水洗之次用桐油紙燃火熏之後用黃蠟一兩麻油五錢枯礬五分共入鍋內煎溶以油紙攤膏貼之待膿盡上生肌散二味敷方螵蛸一兩枯礬五分共為末以椒茶鹽水洗淨敷之又方雄黃豬膽以桐油調搽之亦效外臁外臁生於正臁骨上洗法同前方不論內外經年不愈以成頑瘡粉毒者有之以致腳瘡血虛又加涉水之勞洗淋過度此血脈汙濁凝滯不能行而瘡痛或遇夜痛甚營血行於陰也患者必節口味雞能生風魚能助火豬肉屬陽亦助火也須戒慎之治法宜托裡流氣飲和血為主止痛用澤蘭葉敷之甚效十八味托裡流氣飲蒼朮靈仙梔子紅花連翹木瓜乳香沒藥川柏牛膝杏仁赤芍當歸川芎生地防風羌活皂角刺量大小虛實各等分生薑引水煎空心服服後以三白膏貼之三白膏白蠟一錢輕粉一錢獖豬油三兩捶爛以油紙攤膏貼之未貼三白膏之先用陳泥燉即點燭陳泥座捶細以水和之攤薄餅轉傳患處用燈草二根為水路取陳艾燃二支灸泥餅上要灸得痛至癢癢至痛方住再上三白膏五寶丹鍾乳火煅三錢冰片二分琥珀三錢五分珍珠二分硃砂二分灰面三錢六味共為末分作十二股外用土茯苓六斤每半斤捶細煎濃湯將前藥每夜配一服置掌中吮之以土苓湯咽之次日將湯作茶忌鹽十二日並一切發物又方臁瘡初起用青布包乳香沒藥螵蛸艾葉在內捲成筒或桐油或麻油浸透於瘡上四圍照而熏之痛要熏癢癢要熏痛仍以雄黃豬膽搽用澤蘭煎湯洗亦好又方無論內外二臁俱效將黏穀草包陳艾熏過數次後用蔥椒炒鹽五加皮煎水洗瘡再將松節燒炭研灰麻油調敷以傘紙包將針刺幾眼貼肉如干以油調潤之又方以百草霜一味空心入口嚼成泥敷之四味敷方用靴皮不拘多少火煅存性為末加乳香沒藥檳榔血蠍共為末後以椒茶鹽煎水洗淨展開用麻油搽瘡一遍再用藥末敷之又方黃柏一兩以豬膽汁搽黃柏灸之灸干又搽又灸以透為度研末入冰片一分調勻再將椒茶鹽湯洗淨拭乾四圍搽之恐生內大急又方黃蠟七錢清油四兩鳳凰衣出雞蛋殼婦人發以文武火煅成膏滴水成珠時速下百草霜一兩人中白一兩攤隔紙膏貼之丫指毒丫指毒生於大指丫內由濕熱蘊蓄而成也始覺腫硬即以艾灸之立愈不然以豬膽調雄黃搽之亦效若腫甚而潰者以六味敷毒散敷之六味敷毒散雄黃螵蛸龍泉粉白芨乳香大黃共為末或酒或雞子清調敷效
