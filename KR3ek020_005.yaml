body:
  text: 卷之五面圖形十二症二頂癰赤面疔肩疽螻蛄上串螻蛄中串螻蛄下串乳根癰生乳下肚腹癰腎氣遊毒痔漏鞋帶癰足心癰頂癰頂癰生於顛頂之上乃人身經絡之總司也其病在心六腑不調濕熱聚之而成毒宜升麻敗毒飲羌活勝濕湯外用敷藥徹盡膿水然後生肌可愈十味升麻散毒飲藁本白芷連翹桔根川芎防風當歸二花升麻白芍食遠服十味羌活勝濕湯蒼朮制連翹黃柏獨活防風白芷細辛當歸黃連牛子以上俱用酒炒食遠服十味敷方青木香白芷二花膽草大黃生地當歸青蒿白芨黃連酒和搗爛敷之赤面疔赤面疔生於人面上乃脾經積熱上炎初生如黍米大略癢切勿抓破若犯之其害甚大始用鐵箍散後用追毒飲崩毒飲若腫起內只服藥使膿熟自穿以生肌散敷之十二味追毒飲羌活白芷升麻黃連雄黃乳香沒藥柴胡甘草防風川芎桔根食遠服十一味崩毒飲雄黃乳香沒藥兒茶硃砂牛黃全蠍白礬木香白芷甘草姜引若病勢大加大黃穿山甲煎成膏日服六七次疔自拔而毒自消大有神效勿輕視此方也肩疽肩疽生於兩肩之上乃肺脾積熱上衝肩井始生時人多不識但肩井中痠痛六七日方現形若不治六七月不得痊愈甚至肩井燥爛而危矣初覺時以艾火灸之內服海馬崩毒流氣飲外用敷藥膿盡上生肌散十味海馬崩毒飲硃砂雄黃乳香沒藥白礬穿甲白芷大黃連翹木香食遠服十一味流氣飲木香桔根蘇葉烏藥白芷川芎二花青皮赤芍柴胡骨皮食後服四味敷方白果肉貝母雄黃大棗共搗爛敷之螻蛄串螻蛄串者蟲多也其形如蜻蜓頭短尾長善迎風走水患見疾不破不已如潰破若不斷其膿水自肩井貫串至肘臂之上貫而串串而三焉若下一二寸為中串再下一二寸為下串因不斷膿以至貫串祕方用斷爛散以燈火斷之又以艾灸肩井穴並肘尖曲池各五七壯內服湯藥外用膏藥並生肌散調治月餘而愈不然恐成廢人此疾因五臟六腑蓄受濕熱故外傷皮膚而成也十五味加味流氣飲木香甘草升麻乾葛枳殼蘇葉桔根烏藥白芍白芷川芎防風厚朴羌活二花食遠服十二味加味三香湯乳香沒藥茴香人參黃耆當歸白芍甘草防風桔根連翹川芎食遠服十六味加味定痛湯人參黃耆木香甘草黃連桔根當歸赤芍白芷川芎防風乳香羌活獨活茯苓香附食遠服十二味敷方大棗白果肉荔枝肉雄黃龍眼肉硃砂螵蛸枯礬乳香沒藥二花兒茶以酒搗如泥敷之九味斷爛散枯礬膽礬寸香雄黃乳香沒藥兒茶石膏螵蛸共為末磨京墨調勻敷搽四圍即愈七味敷方膽草乳香沒藥熊膽黃連牛膝二花共搗細末用檳榔磨好酒調敷毒四圍而愈乳根癰乳根癰生於兩乳之下乃厥陰陽明經之所司也因氣壅血滯濕氣蘊蓄而生宜海馬崩毒飲一醉忍冬湯二方見前敗毒定痛飲初覺以艾灸外用膏藥生肌散可愈敷方與前乳發內吹同十二味敗毒定痛飲羌活獨活防風白朮荊芥白芍升麻乾葛二花連翹黃耆蒲公英食遠服肚腹癰肚腹癰生於肚臍之側乃太陰脾經所司也因脾有熱心火太盛初起根腳如盤寒熱發戰宜用艾灸可使重變輕也宜內服外敷後藥後上生肌散切勿勾割二十一味內托流氣飲人參黃耆白朮木香川朴甘草乾葛柴胡蘇葉黃連桔梗枳殼肉桂檳榔當歸白芍白芷川芎防風二花牛子空心服七味敷方龍膽草乳香沒藥熊膽黃連牛膝二花共研細末用檳榔磨水好酒調藥敷毒四圍即愈腎氣遊毒腎氣遊毒生於大胯之側陰頭盡處之地乃足少陰經之所司也男或由行房而為風熱所傷女由行經而為風熱所搏初覺宜神仙敷毒失笑餅方見前如痛起用定痛流氣飲檳榔墜毒丸外用萬靈膏徹盡膿水可愈十三味定痛流氣飲木香紫蘇桔根枳殼厚朴連翹檳榔香附木瓜防風牛膝大腹皮二花空心服五味檳榔墜毒丸枳殼麩炒一兩大黃半生半熟一兩半木瓜一兩防風五錢檳榔一兩共為末煉蜜為丸如黃豆大每用五六十丸長流水送下服六七次為度其毒可盡又方仙人掌土牛膝以酒捶細敷之痔漏痔漏生於肛門之邊乃下焦之所司也好酒色之人多有之因火氣下流腸胃蓄熱其名有七治法則一曰牝曰牡曰雞冠曰羊奶曰通腸曰翻花曰脈痔惟有通腸翻花難療治外痔之法始生用艾隔蒜灸三四壯去蒜貼肉灸三四壯可不勞而愈或用過天絲結斷痔頭然後用敷藥又須用黃連四物湯蝟皮丸涼血地黃湯葛根湯治內痔之法宜涼血解毒升提其墜氣可愈若漏痔或因附骨之症或因痔窟之開而不與生肌長肉直至內潰膿血淋漓宜蠟礬針以納其穴服上湯丸以拔其毒仍貼萬靈膏徹盡膿血再上生肌散可愈至若通腸翻花須內消加敷方上方均可服而愈五味黃連四物湯當歸酒洗一錢黃連七分川芎白芍生地各二錢空心服二味蝟皮丸蝟皮酒浸過焙乾四兩槐角經霜者焙乾一斤將此二味為末和勻蜜為丸如梧桐子大淡酒空心送下每早百丸外洗蒸法黎擊子即算盤子十股桑白皮一股煎水蒸洗不過三四次而愈矣五味槐角丸槐角制半斤槐花制半斤檳榔四個蝟皮酒浸焙乾一兩黃芩二兩俱為細末煉蜜為丸如梧桐子大或酒或水送下十味涼血地黃湯生地赤芍丹皮槐角紅花枳殼梔子黃柏連翹黃連空心服二味結痔法用過天絲與蠶絲合成纏痔頭上六七轉上貼不厚不薄蒜一片著艾灸於蒜上三壯後上生肌散可愈二味蠟礬針用黃蠟溶化枯礬末少許搓成長條納入漏竅中膿血盡上生肌散二味洗痔湯用馬齒莧煎水洗之又以白花菜煎水洗之鞋帶癰鞋帶癰生於腳脛彎之上龍骨之下乃濕氣流積於此而生宜內服檳榔定痛飲外貼萬靈膏膿盡上生肌散可愈五味檳榔定痛飲檳榔木瓜牛膝乳香黃柏空心服腳心癰腳心癰生於腳掌心中湧泉穴乃至陰所生也因伏熱於內濕熱下流或遠行履濕地或沾惹毒氣或被物所傷而生初覺宜艾灸內服牛膝湯外貼萬靈膏膿盡上生肌散不然恐成漏腳即是神仙不能治矣八味牛膝湯王瓜根土茯苓牛膝黃柏蒼朮羌活黃連當歸燈心引空心服六味敷方車前子燈心草地骨皮二花龍膽草通草以酒糟捶爛敷之
