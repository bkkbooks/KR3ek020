front:
  text: 贈萬密齊先生醫書序余蒞羅三年未嘗得一日讀書自覺面目語言為古人憎間有一二問業者持帖括進非不欣然接之牒訴倥傯去復不能志也況復有餘力及醫藥諸書哉丙申秋謁防憲於蘄陽中州趙公曰知子邑有密齊乎人云古矣厥書可傳也余愧無以應歸而詢諸邑紳先生嘖嘖稱密齊萬生歧黃名手噪聞於隆萬年間今其書恐弗全也余乃益愧夫古人宰一邑一邑之名山大川奇人傑士無不夙具胸中收諸藥籠今瑰琦如許曾不曉其姓字寧不愧得人之義又何以為地方解此嘲哉乃取其書進其孫達而詢之始知萬生名全別字密齊邑廩生以不得志於八股棄而就青囊之業業輒精屢效以其效者志諸編文成數十卷先為樵川太守李公付梓一時紙貴三湘因兵燹後板毀無存其孫達僅存一帖置牆壁中賴以免凡官滋土者無不知此書無不購此書然繕寫告艱又進其孫達而謀之搜括錙銖益以清俸募梓人凡八閲月卒工得書一十有八卷展而思之夫醫者意也意之所致醫者不知其為工而方已傳於後然則世之所為醫書皆方之積也今之醫者皆欲有醫之名欲有醫之名而不得不求乎書其勢然也然欲有醫之名而不善讀醫之書無益於醫而究咎於書是書之靈不能益於醫而醫之名乃能變化其書也醫而名矣何難於著書然世所號一代名手類就習之所近業之所傳頓欲竦一世之人而以名豫之今讀其書何如哉萬生之為醫似其為學非惟不使人知而究不敢以名醫自處者此其所以能為醫也此其所以能為書而可傳也余讀而服之詳其著書之意寧使醫至而名不我追毋使名至而醫追之者也吾輩治一邑不能有濟於世則以有有濟於世者為幸念今之人猶有君子其人廣傳其書者乎以快吾心而矢吾力翻而刻之可也康熙五年丙午通家弟知羅田縣事直隸呂鳴和拜撰
