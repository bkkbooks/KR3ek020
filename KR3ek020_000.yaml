body:
  text: 敘事有出於仁人孝子者雖千萬年猶赫也嘗觀昔之亮採奮庸以及秉鐸宣教彼多功德福人著作於昭要皆救濟為懷焉矧外此而攝生保命又古皇所必欲傳哉然則仁人之言之赫赫者斯世之幸而孝子之不欲祕惜之者又萬世之幸矣吾羅密齊萬氏全書久重海內後藏板以書林火失而邑中所存之書又以明季荒殘失懷青囊者未嘗不嘆恨也幸五世孫萬通之獲祕藏於千百泥磚蓋魯壁之經天直不欲絶此道於後祀焉者邑人士當方悅李師棠蔭之暇僉請付梓公世而慮工浩難成余與通友謀曰通之有小兒片玉痘疹乃家世所祕傳而全書未經載者曷先刊以為全書之藉通之欣然乃出屬誦友考訂授梓逾半載而始就嗣後全書漸次刊行然是小兒一書圖歌方症探妙鉤玄詢盧扁之精微肯堂之未及闡悉者如許奇珍寧不寶世父母斯人斷不忍有一夫不獲之事余意後來全書一出將民無疵癘而物無夭扎嬉嬉于于俱遊於堯天舜日中矣誰謂醫之書非採庸教鐸之功德哉誰謂萬氏之書不成於仁人孝子之闡揚哉企傳全璧以志不朽云時順治之甲午歲季夏穀旦邑人召藜劉一炅書題敘萬氏幼科源流粵自先祖杏城翁豫章人以幼科鳴第一世蚤卒先考菊軒翁孤繼其志而述之成化庚子客一羅娶先妣陳氏生不肖乃家焉其術大行遠近聞而誦之萬氏小兒科云為二世羅有世儒張玉泉胡柳溪講明律歷史綱之學翁知全可孝命從遊於夫子之門而學焉頗得其傳翁卒矣顧其幼科之不鳴不行也前無作者雖美弗彰後無述者雖盛弗傳不肖之責也故豫暇日自求家世相傳之緒散失者集之缺略者補之繁蕪者刪這錯誤者訂之書成名育嬰家祕以遺子孫為三世異乎有子十人未有能而行之者其書已流傳於荊襄閩洛吳越之間莫不日此萬氏家傳小兒科也餘切念之治病者法也主治者意也擇法而不精徒法也語意而不詳徒意也法愈煩而意無補於世吾不明後世君子必有明之者不與諸子恐其不能明不能行萬氏之澤未及肆世而斬矣與門人者苟能如尹公他得瘐公之斯而教之則授受得人夫子之道不墜若陳相雖周孔之道亦失其傳也諸賢勗之哉
