body:
  text: 卷之四面圖形十二症一鬢髮眉發耳發頤發鬚髮肩發乳發胸發手背發小便毒便發生於陰頭之上腳背發腳跟發鬢髮鬢髮生於兩額之間小兒婦人多有之男子生此者多不救乃手足少陽太陰之所司也因心肝積熱頭額受風故生此毒宜泄二經之熱以十一味柴胡升麻湯十一味柴胡升麻湯藁本羌活升麻乾葛防風黃連赤芍生地麥冬當歸蒲公英酒洗二次空心服八味神方白芷散白芷升麻二花桔根川芎連翹黃連羌活食後服七味敷方雄黃兒茶螵蛸乳香沒藥麝香牛黃共為末以酒調敷眉發眉發生於兩眉之間燥爛如人眼目甚可畏也小兒生此立死大人生此者十全二三乃手足少陽經所受也宜用海馬崩毒法不然膿血浸兩眼目先壞宜用後二藥相兼服後排膿生肌常服之九味清心蓮子飲黃耆甘草蓮子車前仁茯苓麥冬去心人參黃芩地骨皮食後服十二味羌活敗毒散人參黃耆羌活獨活連翹乾葛升麻川芎地骨皮白芷丹皮二花食後服八味敷方牛黃雄黃硃砂血蠍兒茶乳香沒藥螵蛸共為末以酒調搽之耳發耳發生於耳門邊乃心腎濕熱所生其病有三曰簟耳曰痔耳曰濕耳俱先用清肝流氣飲後用定痛降火飲若簟耳痔耳用針刺破以清涼膏貼之生肌散敷之十四味清肝流氣飲枳殼桔根黃芩柴胡羌活赤芍防風川芎荊芥白芷升麻連翹甘草前胡食後服十三味定痛降火飲柴胡前胡紫蘇防風厚朴陳皮甘草半夏川芎白芷當歸羌活升麻蔥引食後服九味清涼膏黃連大黃黃芩鬱金朴硝玉簪花獨腳連天花粉白芨共為末雞蛋清調搽頤發頤發生於兩顴骨之下一寸乃手足太陽陽明經所屬也因脾肺積熱故生斯毒若不早治定成漏腮初起時用雀茶煎湯洗之隨服升麻解毒湯十二味追毒散外敷生肌散愈九味升麻解毒湯升麻乾葛防風甘草白芍羌活川芎玄參白芷食遠服十二味追毒散連翹白芷防風羌活升麻黃連酒炒荊芥二花當歸黃耆人參黃芩食後服三味敷方雄黃白芷螵蛸共為末敷之鬚髮鬚髮生於頤下地角處乃手足太陽太陰經之所屬也因飲食太過蓄熱上升始生如黍米大由漸燥爛痛癢不一經年不愈以抱風藤一大把煎水熏之勿透熱氣衝臉內服升麻解毒湯及追毒散見上外用敷藥可愈四味敷方石膏螵蛸雄黃枯礬共為末敷之肩發肩發生於兩肩背之上乃手足三陽三陰經之所屬也因風濕熱積而成毒或挑擔人多生此疾宜服內托流氣飲外用清涼膏及生肌散並敷方十四味內托流氣飲炙黃耆生地白芷川芎赤芍防風甘草人參玄參黃連桔根連翹二花羌活食後服六味敷方半邊蓮皂角刺木鱉子仙人掌雄黃大楓子共為末敷之外可用清涼膏及生肌散方見上乳發乳發生於兩乳之上乃厥陰陽明經所屬也有內吹外吹之別惟婦人多生此病因二經風熱壅塞血氣凝滯而生內吹者因胎中小兒氣吹故生此病初起覺以艾葉灸併火罐燎之效外吹初覺捏髮乳出亦可消若內吹至産後自愈若外吹不治必致穿胸走脅而斃矣先服一醉忍冬花酒方見前隨服十六味敗毒流氣飲定痛乳香湯外用萬靈膏生肌散敷之十六味敗毒流氣飲蘇葉桔根枳殼甘草防風柴胡前胡連翹川芎羌活升麻白芷當歸黃耆二花皂角刺食遠服十三味定痛乳香湯人參黃耆當歸酒洗川芎茯苓甘草烏藥香附赤芍乳香沒藥二花連翹食遠服九味敷方乳香沒藥熊膽兒茶螵蛸寸香龍泉粉百草霜緑豆粉共為末酒調敷之又方生酒糟搗蒲公英渣敷之其酒儘量飲之至醉效貼以萬靈膏收以生肌散方見上胸發胸發生於正胸之中上離結喉三寸離心窩不遠乃手足六經交會相關之所此症酷促人命在三四日間若不速治骨裂皮開甚可畏也先宜拔毒定痛勿使定花開花可也定痛以火紙卷乳香沒藥末於中外以青布包紙條以油醮條燃火於痛毒上熏之若痛要照至不痛此神效也內服祛毒鎮心飲勿使開花若開花神仙不治也慎之慎之十一味祛毒鎮心飲硃砂麥冬黃連二花青木香乳香當歸酒洗生地蓮米去心茯苓連翹姜引豬心一個水四碗煎一碗空心服十二味清熱潛心湯麥冬乾葛升麻硃砂乳香黃連當歸川芎桔根柴胡黃耆蜜炙連米去心煎法同前空心服手背發手背發生於兩手之上筋骨之間乃手六經之所屬也由心肝積熱流於手背而生始覺宜鐵箍散外敷後以定痛流氣飲並內托流氣飲外用萬靈膏生肌散方見上可收全功此症初起如黍米大後酷可不懼哉十四味定痛流氣飲人參炙耆川芎茯苓甘草烏藥當歸枳殼白芷乳香防風羌活白芍連翹食遠服十五味內托流氣飲羌活升麻人參黃耆烏藥當歸川芎甘草防風官桂白芷厚朴木香連翹二花食遠服六味白芥子散白芥子官桂羌活黃連二花天花粉具用水酒炒水煎食遠服三味敷方地骨皮絲瓜子二花以酒和搗細敷上三味敷方鬼見愁地骨皮膽草以酒和搗爛敷上又方用抱風藤又名抓山虎一大把入瓦罐內煎水以罐口對準瘡口熏之如水冷又煎又熏日熏七八次如痛將罐口移遠些不痛移近些不過三四日後膿干腫消止痛平復就好此方神效此三方發背俱可通用甚效小便毒便發小便毒生於陰頭之上乃人身腎脈之總司也又名便發因酒色過度極熱流於下焦或惹婦人陰蝕而生或行經時交合而生受禍雖不同其害則一神方難醫初起之時用紫花地丁麝香三四分生薑一片煎水一碗空心服之神效如小便脛腫痛宜服木香流氣飲檳榔追毒飲如燥爛亦宜敷貼不然膿血塞竅脹腫難禁矣十六味木香流氣飲木香木通紫蘇荊芥半夏豬苓澤瀉連翹白朮赤芍黃連車前穿甲黃柏茯苓萹蓄燈草為引空心服九味檳榔追毒飲檳榔牛膝木通草節豬苓連翹生地黃柏二花燈心引空心服五味敷方牛膝草冬時取根通草車前仁二花膽草共用酒浸搗爛敷之七味敷方雄黃血蠍螵蛸兒茶枯礬黃連乳香共研細末用黃蠟白蠟熬溶攤油紙上包裹前藥末貼陰頭上甚效試效方水粉四六片兒茶虎耳草汁調搽一方加松香一方加青黛一方加石膏腳背發腳背發生於腳背之上筋骨之間乃足少陰所屬也比手發尤甚因濕熱相搏血滯而成或赤腳沾惹蛇毒蟲毒或撞破皮而成或染穢物觸犯而成者始覺宜鐵箍散方見前次用後藥再用萬靈膏徹膿生肌散收口八味墜毒沉香飲沉香木香牛膝檳榔膽草生地木瓜二花空心服十味三香木瓜飲木香乳香沉香木瓜防己檳榔黃連二花骨皮丹皮空心服腳跟發腳跟發生於腳跟之上由汗腳涉水或遠行傷筋或濕熱流注而成初起勿視容易始生多癢多將艾灸十餘日自愈不然則膿血淋漓經年不斂以萬靈膏貼之以生肌散敷之如癢以椒茶朴硝湯洗之內服六味五味子湯可愈六味五味子湯牛膝防己檳榔赤芍牛子五味空心服四味敷方乳香沒藥螵蛸石膏共為細末用黃白蠟溶化入藥末䬪餅包貼患處
