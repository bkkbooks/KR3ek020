body:
  text: 卷之七側圖形十二症結喉風癰鬢疽赤面疔頭癰挑針瘰癧馬刀瘡上脅癰下脅癰腿遊毒臀癰指丫刺指風刺結喉風癰結喉風癰生於結喉之間號曰海門第一關其毒最危由心肝脾肺腎火熱上炎毒氣攻喉若喉癰外症宜服內托流氣飲外貼萬靈膏生肌散切勿用針自取危篤如喉風內症必畏寒或腫或不腫必痰涎壅塞痛甚或湯水略下即以三稜針於少商穴刺出血瀉其毒即服甘桔湯如病勢重即服化毒湯或研末吹之如惡寒腰痛發熱名喉閉傷寒宜發散用內托流氣飲方見前或宜下甘桔湯甘桔湯人參桔根甘草射干升麻牛子荊芥穗山豆根俱以滾水泡百步峰為引治內十味化毒湯桔根五錢薄荷葉二錢荊芥三錢半甘草二錢山豆根二錢半牙皂二錢硼砂二錢芒硝三錢辰砂二錢雄黃二錢共研細末或吹喉或湯服治內十五味洗毒散桃仁去皮尖為末雄黃穿甲炒焦枳殼麩炒玄參酒磨檳榔酒磨桔梗紅花酒炒赤芍生用木香水磨甘草生用澤瀉略炒丹皮皂角刺為引若下加大黃四錢再煎一二沸服之內外俱用七味吹鼻散專治急喉風小牙皂三分明雄六分全蠍梢焙乾六個藜蘆一錢半牙硝一兩麝香一分生礬三分共為細末吹入鼻中吐出痰涎自愈又方用水榨刺蟲名雀不踏或三五個焙乾青魚膽臘月取之酒米為末用三分冰片五釐麝香三釐速取吹喉中立效此治急喉風之神效也外方治諸骨哽喉方用玉簪花根搗汁以筆管灌入喉中甚效又方用金鳳仙花根即紅鳳仙也搗汁合醋煮數沸用有嘴瓶盛之仰臥而灌之其骨即出又方用威靈仙根搗汁和醋煮之吞法同前上二花根不可沾牙又方紅砒三分糯米為丸銅緑為衣薑湯送下即時吐出又方喉中被骨刺傷已生血泡甚至日刻漸長緊塞喉中外不能進內不能出宜速用牙皂三分膽礬半分上片五釐麝香五釐為極細末吹入喉中二三次即泡破血出而愈又方凡小兒誤吞穀麥芒刺者急取鵝口涎吞之甚效取涎將鵝倒掛的口涎取用以上諸方無論大人小兒皆可用鬢疽鬢疽生於兩鬢之中由脾肺心肝積熱而生也內服敗毒清氣飲外用敷藥膿盡用生肌散可愈十四味敗毒清氣飲紫蘇桔梗枳殼當歸甘草白芍白芷川芎柴胡羌活前胡連翹升麻乾葛空心服五味敷方白芨龍泉粉青木香乳香雄黃以酒調捶細敷之赤面疔赤面疔生於正面之上浮腫而紅乃心肝血熱氣壅上衝然也宜先服十一味升麻敗毒湯後服敗毒消氣飲方見上外敷八味一掃涼敷方萬靈膏生肌散可愈十一味升麻敗毒湯升麻白芷乾葛白芍甘草桂枝連翹當歸羌活桔根荊芥食後服八味一掃涼敷方熊膽兒茶乳香沒藥生地片腦雄黃共為末以黃連黃柏煎井水調敷患處可消頭癰頭癰即正後發也生於後頸之上由五臟積熱而生初覺用神仙祛毒一掃丹失笑餅選用內服後方外用萬靈膏膿盡上生肌散可愈十八味敗毒流氣飲人參黃耆官桂當歸甘草川朴紫蘇桔根枳殼檳榔烏藥防風白芷川芎二花白芍柴胡連翹食後服挑針挑針生於兩眼上下胞由肝脾積熱而生初起以冷水拍後頸背膊百遍有紅筋自泡起用布針刺破則腫消矣瘰癧瘰癧生於耳後及項間一名九子癰一名老鼠疱其實皆瘰癧也多起於少陽經蓋少陽多氣少血故也由嗜欲太甚酒味太厚思想太勞志願不遂思淫於外內蘊七情中傷六欲或傳染或誤治種種不同為痰則一男子見此潮熱頻生女人見此經水不調漸成不治之症如初見耳後項下或三四個或似連珠即如初起核上以艾灸之每核各八九壯或十餘壯更於肩井肺俞風池缺盆等穴各灸三五壯真有起死回生之妙矣後服消痰降火之藥可不勞而收全功也每見人頻用爛藥甚至勾割自取喪亡可不惜哉患此者必要清心養性淡味節食可保終始也治此症者當各盡心庶不夭折矣以萬靈膏清肌消毒長肉生肌是為聖藥既潰徹盡膿長肉消毒是為神方此二者對症之藥也必不可少十八味消痰和氣飲陳皮去白半夏薑汁炒茯苓玄參桔根荊芥升麻去黑皮白芷紫蘇酒洗黃芩酒浸黃柏酒炒昆布川芎當歸木香防風花粉甘草食後仰臥服二十二味開鬱清痰丸香附醋炒陳皮去白半夏酒炒川芎甘草蒼朮酒炒羌活桔根黃連海石黃芩全歸玄參白芷石膏連翹枳實貝母青黛花粉昆布海藻酒洗以上研細末煉蜜為丸如梧子大或薑湯或茴香湯送下每早空心服六七十丸可愈十一味清肝流氣飲紫蘇防風桔根枳殼麩炒甘草厚朴薑汁炒前胡川芎當歸羌活萊蔔子水煎不拘時服十三味消風和氣飲紫蘇桔根枳殼甘草烏藥香附茯苓半夏厚朴青皮羌活柴胡赤芍薑棗引空心服十八味救苦化痰湯黃耆蜜炙人參甘草連翹丹皮當歸生地白芍紫蘇羌活防風昆布三稜桔根玄參升麻龍膽草天花粉姜引食後服仰臥片時二十二味敷方乳香沒藥血竭螵蛸兒茶熊膽麝香雄黃硃砂牛黃白芷赤石脂礞石穿甲云丹粉百草霜龍骨虎骨豬頭骨狗頭骨雞頭骨其骨俱用火煅青魚膽共為細末無論已破未破俱敷上外用萬靈膏蓋之馬刀瘡馬刀瘡生於缺盆之外自胸而至脅蓋由痰核瘰癧之時治不如法以至潮熱頻作血氣精神減少腫起大潰以致膿血毒氣下流而發此症何謂馬刀蓋馬者行甚速也刀者利器也行疾而器利無將豈能善敵哉必須先服奔毒飲外著艾灸肩井肺俞膻中風池中腕百勞曲池等穴各五六壯宜用前瘰癧症內諸方皆可服若馬刀未破其面小即從核上灸之外貼萬靈膏並敷藥調理自愈如稍遲延雖神丹不可治也二十四味奔毒飲花粉牛子生地當歸昆布柴胡青皮桑白皮黃柏桔根川芎人參黃耆白朮乳香沒藥雄黃羌活麥冬乾葛升麻黃連硃砂陳皮食遠服十七味瘰癧時方海藻海帶昆布以上各二錢但以醋浸洗焙乾火煅連翹去隔陳皮桔根石膏黃芩牡蠣火煅各二錢荊芥柴胡防風黃柏苦參黃連薑汁炒各一錢木通夏枯草各四錢此藥要用十劑空心服忌生冷發物外一方用蒼朮三斤蔥斤半俱切片熬膏以青布攤膏貼之效一日三換四味敷方萆麻子去殼油一兩松香嫩者五錢乳香血竭各一錢搗成膏敷貼之已破後即用此方十味瘰癧藥酒方二花四兩萱草根四兩益母草四兩紫花地丁四兩玄參甘草大黃石菖蒲各五錢鵝不食草歸尾各四錢用好酒十壺煮三炷香埋土中三日取出不拘時服已潰未潰服之俱效十七味痰核腫痛方連翹歸尾白芷各二錢防風六分乾葛四分枳殼三分花粉七分陳皮六分貝母五分茯苓四分苦參三分二花二錢炙草三分桔根六分黃芩三分蘇梗三分夏枯草二錢以上藥味俱不可加減用水碗半煎一碗再用野菊花根煎水酒共三鍾對前藥每日早中晚食後服此方神效救人多矣上脅癰上脅癰生於脅下二三寸遠乃肝經風熱壅甚故生此毒宜清肝流氣飲如潰萬靈膏貼之上生肌散自然平安十九味羌活定痛飲羌活獨活玄參升麻白芷乳香沒藥防風紫蘇桔根柴胡麥冬甘草黃耆人參白朮連翹二花薑棗引食遠服下脅癰下脅癰生於兩脅下與臍相對是也由肝腎二經濕熱壅甚而生治法湯藥與上脅同腿遊毒腿遊毒生於大腿之中乃腎與小腸之所司也由邪聚於經絡熱氣傷於皮膚血凝此處而生始覺用一掃丹失笑餅可消方見上遲則服後藥潰後用萬靈膏徹膿再上生肌散可愈十三味紫蘇流氣飲紫蘇川朴甘草香附檳榔木瓜腹皮川芎二花枳殼烏藥牛膝骨皮十一味托裡流氣飲紫蘇枳殼桔根羌活獨活大黃甘草腹皮烏藥香附連翹空心服臀癰臀癰生於臀突之上上近腰腎下近大腿由濕熱相侵氣血凝滯而生形大如盤上腫其腰下腫其胯此為陰中之陽因血結而氣不通矣宜宣熱拔毒大補氣血之劑厚脾胃滋補根本如此則膿易作而熱易宣宜拔毒羌活飲宣熱連翹湯不然經年月難愈滋補之後膿血既成以長針開之針孔內以芫花根插之外用萬靈膏貼之內服人參敗毒散俟膿盡而自平矣勿圖速效聽信下工之言以草藥敷之血得寒涼凝聚不行以致數年之苦良可畏矣十九味拔毒羌活飲羌活獨活連翹白芷桔根紫蘇枳殼檳榔大腹皮柴胡前胡白芍當歸鬱金乳香沒藥丹皮穿甲皂刺引空心服二十三味宣熱連翹湯連翹紫蘇甘草黃連人參黃芩黃耆川芎當歸生地梔子柴胡枳殼香附赤芍鬱金地骨皮白朮二花牛子茯苓川朴花粉水煎空心服指丫刺指丫刺生於足指上因濕熱侵指而成其症痛癢不一用下藥敷之九味敷方金鳳草子亦可膽草蘇葉骨皮雄黃乳香沒藥忍冬草車前子以酒糟搗敷之六味敷方龍泉粉白芨骨皮石榴皮螵蛸丹皮共搗爛以酒調敷血盡再上生肌散可愈
